<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mohamed Adebba | Portfolio</title>

  <link rel="stylesheet" href="style.css">

  <!-- Devicon icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>

<body>
  <header class="hero" id="top">
    <div class="overlay"></div>

    <div class="topbar">
      <!-- Brand -->
      <a class="brand brand-typer" href="#top" aria-label="Go to top">
        <span id="brandType"></span>
        <span class="cursor" aria-hidden="true">|</span>
      </a>

      <!-- Navigation -->
      <nav class="nav" aria-label="Primary Navigation">
        <a href="#about" data-i18n="nav_about"></a>
        <a href="#education" data-i18n="nav_education"></a>
        <a href="#skills" data-i18n="nav_skills"></a>

        <a href="assets/resume.pdf"
           target="_blank"
           rel="noopener noreferrer"
           class="resume-btn"
           data-i18n="nav_resume"></a>
      </nav>

      <!-- Language Switch -->
      <div class="lang" aria-label="Language selector">
        <button class="lang-btn active" id="btn-en" type="button">EN</button>
        <button class="lang-btn" id="btn-fr" type="button">FR</button>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero-content">
      <h1 id="hero-name"></h1>
      <p class="subtitle" id="intro"></p>

      <div class="buttons">
        <a class="btn primary" href="#projects" data-i18n="btn_projects"></a>
        <a class="btn" href="#contact" data-i18n="btn_contact"></a>
      </div>
    </div>
  </header>

  <main>
    <!-- ABOUT -->
    <section class="section" id="about">
      <h2 data-i18n="about_title"></h2>
      <div class="card">
        <p data-i18n="about_text_1"></p>
        <p data-i18n="about_text_2"></p>
      </div>
    </section>

    <!-- PROJECTS -->
    <section class="section" id="projects">
      <h2 data-i18n="projects_title"></h2>

      <div class="cards">
        <article class="card">
          <h3 data-i18n="p1_title"></h3>
          <p data-i18n="p1_desc"></p>
        </article>

        <article class="card">
          <h3 data-i18n="p2_title"></h3>
          <p data-i18n="p2_desc"></p>
        </article>

        <article class="card">
          <h3 data-i18n="p3_title"></h3>
          <p data-i18n="p3_desc"></p>
        </article>

        <article class="card">
          <h3 data-i18n="p4_title"></h3>
          <p data-i18n="p4_desc"></p>
        </article>
      </div>
    </section>

    <!-- EDUCATION -->
    <section class="section" id="education">
      <h2 data-i18n="edu_title"></h2>

      <div class="card">
        <h3 data-i18n="edu_school"></h3>

        <p>
          <span data-i18n="edu_degree"></span> •
          <span data-i18n="edu_grad"></span>
        </p>

        <p>
          <span data-i18n="edu_gpa_label"></span> 3.5
        </p>
      </div>
    </section>

    <!-- SKILLS -->
    <section class="section" id="skills">
      <h2 data-i18n="skills_title"></h2>

      <div class="cards">
        <!-- Programming -->
        <div class="card">
          <h3 data-i18n="skills_prog_title"></h3>

          <ul class="skills-list">
            <li><i class="devicon-python-plain colored" aria-hidden="true"></i><span>Python</span></li>
            <li><i class="devicon-cplusplus-plain colored" aria-hidden="true"></i><span>C++</span></li>
            <li><i class="devicon-javascript-plain colored" aria-hidden="true"></i><span>JavaScript</span></li>
            <li><i class="devicon-html5-plain colored" aria-hidden="true"></i><span>HTML</span></li>
            <li><i class="devicon-css3-plain colored" aria-hidden="true"></i><span>CSS</span></li>
          </ul>
        </div>

        <!-- Core Skills -->
        <div class="card">
          <h3 data-i18n="skills_core_title"></h3>
          <ul class="skills-core" id="skills-core-list"></ul>
        </div>

        <!-- Languages -->
        <div class="card">
          <h3 data-i18n="skills_lang_title"></h3>
          <ul class="skills-langs" id="skills-langs-list"></ul>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="section" id="contact">
      <h2 data-i18n="contact_title"></h2>

      <div class="contact-card">
        <!-- Email -->
        <a class="contact-item" href="mailto:medadebbe2017@gmail.com">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
          </span>
          <span data-i18n="contact_email"></span>
        </a>

        <!-- LinkedIn -->
        <a class="contact-item"
           href="https://www.linkedin.com/in/mohamed-adebba"
           target="_blank"
           rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M4.98 3.5C4.98 4.88 3.87 6 2.49 6S0 4.88 0 3.5 1.11 1 2.49 1 4.98 2.12 4.98 3.5zM.5 8h4v12h-4V8zm7.5 0h3.6v1.7h.1c.5-.9 1.7-1.8 3.4-1.8 3.6 0 4.3 2.4 4.3 5.4V20h-4v-5.6c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9V20h-4V8z"/>
            </svg>
          </span>
          <span data-i18n="contact_linkedin"></span>
        </a>

        <!-- GitHub -->
        <a class="contact-item"
           href="https://github.com/medadebbe2017"
           target="_blank"
           rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.38 7.86 10.9.58.1.79-.25.79-.56 0-.27-.01-1.17-.02-2.12-3.2.7-3.87-1.38-3.87-1.38-.52-1.3-1.27-1.64-1.27-1.64-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.67 1.24 3.32.95.1-.74.4-1.24.73-1.53-2.55-.29-5.24-1.27-5.24-5.64 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.17a10.9 10.9 0 0 1 2.87-.39c.97 0 1.95.13 2.87.39 2.19-1.48 3.14-1.17 3.14-1.17.63 1.58.24 2.75.12 3.04.73.8 1.17 1.82 1.17 3.07 0 4.38-2.7 5.35-5.27 5.63.41.36.77 1.08.77 2.18 0 1.58-.01 2.86-.01 3.25 0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/>
            </svg>
          </span>
          <span data-i18n="contact_github"></span>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>
      © <span id="year"></span>
      <span data-i18n="footer_name"></span>.
      <span data-i18n="footer_rights"></span>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
